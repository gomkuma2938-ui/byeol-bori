<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>별을 보고 사는 그리스도인</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    
    <!-- 1. 모든 시각적 요소를 감싸는 메인 컨테이너 -->
    <div id="game-container">
        
        <!-- 1-1. 전역 UI 아이콘 (힌트, 메모 열기) -->
        <div id="global-memo-ui" class="memo-icon-container">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path>
            </svg>
        </div>
    
        <div id="global-hint-ui" class="hint-icon-container">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <span id="global-hint-count" class="hint-count-badge"></span>
        </div>
        
        <!-- 1-2. 동적으로 교체될 콘텐츠가 들어갈 전용 공간 -->
        <div id="dynamic-content">
            <!-- 모든 미션과 스토리 페이지는 이제 이 안에 로드됩니다. -->
        </div>

    </div>

    <!-- 2. 메모 기능 전용 전체 화면 레이어 -->
    <div id="global-memo-layer" style="display: none;">
        <canvas id="memo-canvas"></canvas>
        <div class="memo-controls-wrapper">
            <div id="memo-clear-btn" class="memo-control-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    <line x1="10" y1="11" x2="10" y2="17"></line>
                    <line x1="14" y1="11" x2="14" y2="17"></line>
                </svg>
            </div>
            <div id="memo-close-btn" class="memo-control-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </div>
        </div>
    </div>

    <!-- 3. 힌트 기능 전용 모달 창 -->
    <div id="global-modal-container" class="modal-container" style="display: none;">
        <div class="modal-content">
            <!-- 아이콘을 감싸는 래퍼 -->
            <div class="modal-icon-wrapper">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </div>
            <!-- HINT 제목 -->
            <h3 class="modal-title">HINT</h3>
            <!-- 텍스트 (기존과 동일) -->
            <p id="global-modal-text"></p>
        </div>
    </div>
    
    <script src="main.js" type="module"></script>

</body>
</html>
