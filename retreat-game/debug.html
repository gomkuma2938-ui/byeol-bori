<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 & 테스트 페이지</title>
    <style>
        body { font-family: sans-serif; background-color: #111; color: #eee; padding: 20px; max-width: 800px; margin: 0 auto; }
        h1, h2 { text-align: center; color: #ffcc00; border-bottom: 1px solid #444; padding-bottom: 10px; margin-top: 40px;}
        
        #admin-controls, #push-controls { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            margin-top: 20px; 
        }

        #mission-list {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 20px;
        }

        #mission-list a {
            flex: 0 0 calc((100% - 30px) / 3);
            text-decoration: none;
        }

        .mission-button {
            width: 100%;
            text-align: center;
        }
        
        @media (max-width: 600px) {
            #mission-list a {
                flex: 0 0 calc((100% - 15px) / 2);
            }
        }
        
        .admin-button, .mission-button { padding: 15px 20px; font-size: 1.1em; background-color: #333; color: #fff; border: 1px solid #555; border-radius: 8px; cursor: pointer; transition: background-color 0.2s; }
        .admin-button:hover, .mission-button:hover { background-color: #444; }
        .admin-button.danger { background-color: #8b0000; }
        a { text-decoration: none; }
        
        #rank-display { margin-top: 20px; }
        #rank-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        #rank-table th, #rank-table td { border: 1px solid #444; padding: 10px; text-align: center; }
        #rank-table th { background-color: #222; color: #ffcc00; }
        #rank-table td { background-color: #2a2a2a; }
    </style>
</head>
<body>
    <h1>[관리자] 별보리 제어판</h1>

    <h2>도착 순위 기록</h2>
    <div id="admin-controls">
        <button id="show-rank-btn" class="admin-button">현재 순위 보기/새로고침</button>
        <button id="reset-rank-btn" class="admin-button danger">도착 순위 기록 초기화</button>
    </div>
    <div id="rank-display">
        <!-- 순위가 여기에 표시됩니다 -->
    </div>

    <h2>푸시 알림 발송 (단계별)</h2>
    <div id="push-controls">
        <button class="admin-button" data-phase="2">Phase 2: 천문대 도착 알림</button>
        <button class="admin-button" data-phase="3">Phase 3: 새로운 계시 알림</button>
        <button class="admin-button" data-phase="4">Phase 4: 최종 목적지 알림</button>
    </div>

    <!-- [신설] 게임 상태 제어판 -->
    <h2>게임 상태 제어</h2>
    <div id="game-controls" style="display: flex; flex-wrap: wrap; gap: 15px; margin-top: 20px;">
        <button id="go-to-welcome-btn" class="admin-button danger" style="flex: 1;">전체 초기화</button>
        <button id="reset-mission-btn" class="admin-button" style="flex: 1;">미션 초기화</button>
    </div>

    <h2>개별 미션 테스트</h2>
    <div id="mission-list">
        <p>미션 목록을 불러오는 중...</p>
    </div>

    <script>
        // 1. 미션 목록 불러오기
        window.onload = async function() {
            try {
                const response = await fetch('php/get-mission-list.php');
                const missionFiles = await response.json();
                const listContainer = document.getElementById('mission-list');
                listContainer.innerHTML = '';
                missionFiles.forEach(fileName => {
                    const buttonLink = document.createElement('a');
                    buttonLink.href = `index.html?mission=${fileName}`;
                    const button = document.createElement('button');
                    button.className = 'mission-button';
                    button.textContent = fileName.replace('.html', '');
                    buttonLink.appendChild(button);
                    listContainer.appendChild(buttonLink);
                });
            } catch (error) {
                console.error(error);
            }
        };

        // 2. [신설] Welcome으로 가기 (전체 초기화) 버튼 스크립트
        document.getElementById('go-to-welcome-btn').addEventListener('click', () => {
            if (confirm("정말로 [모든 진행 데이터]를 삭제하고 가장 처음 화면(welcome)으로 돌아가시겠습니까?")) {
                localStorage.clear();
                alert("모든 데이터가 초기화되었습니다. Welcome 페이지로 이동합니다.");
                window.location.href = './'; // 메인 페이지로 리다이렉트하여 로직 실행
            }
        });

        // 3. [신설] 미션 초기화 (story_intro로 가기) 버튼 스크립트
        document.getElementById('reset-mission-btn').addEventListener('click', () => {
            if (confirm("정말로 [미션 진행 데이터]만 삭제하고 미션 인트로 화면으로 돌아가시겠습니까?")) {
                localStorage.removeItem('my_mission_list');
                localStorage.removeItem('current_mission_index');
                localStorage.removeItem('played_missions');
                
                // ★★★★★ 여기가 핵심 수정 포인트! ★★★★★
                // 'intro'가 아니라 'playing'으로 설정하여, main.js가
                // 미션 목록이 없는 것을 감지하고 새로 생성하도록 유도합니다.
                localStorage.setItem('game_status', 'playing'); 
                
                alert("미션 데이터가 초기화되었습니다. 미션 인트로 페이지로 이동합니다.");
                window.location.href = './'; // 메인 페이지로 리다이렉트하여 로직 실행
            }
        });

        // 4. 현재 순위 보기 기능
        document.getElementById('show-rank-btn').addEventListener('click', async () => {
            const displayArea = document.getElementById('rank-display');
            displayArea.innerHTML = '<p>순위를 불러오는 중...</p>';
            try {
                const response = await fetch('php/get-arrivals.php');
                const data = await response.json();

                if (data.success && data.arrivals.length > 0) {
                    let tableHTML = '<table id="rank-table"><thead><tr><th>순위</th><th>이름</th></tr></thead><tbody>';
                    data.arrivals.forEach(arrival => {
                        tableHTML += `<tr><td>${arrival.rank}</td><td>${arrival.name}</td></tr>`;
                    });
                    tableHTML += '</tbody></table>';
                    displayArea.innerHTML = tableHTML;
                } else {
                    displayArea.innerHTML = `<p>${data.message || '아직 도착 기록이 없습니다.'}</p>`;
                }
            } catch (error) {
                displayArea.innerHTML = '<p>순위를 불러오는 데 실패했습니다.</p>';
                console.error(error);
            }
        });

        // 5. 도착 순위 초기화 기능
        document.getElementById('reset-rank-btn').addEventListener('click', async () => {
            if (confirm('[경고] 서버의 모든 참가자 도착 순위 기록을 정말로 초기화하시겠습니까?')) {
                const response = await fetch('php/reset-arrivals.php');
                const data = await response.json();
                alert(data.message);
                document.getElementById('rank-display').innerHTML = '<p>도착 기록이 초기화되었습니다.</p>';
            }
        });
    
        // 6. 푸시 알림 발송 기능
        document.getElementById('push-controls').addEventListener('click', async (event) => {
            if (event.target.tagName === 'BUTTON') {
                const phase = event.target.dataset.phase;
                if (!phase) return;
    
                if (!confirm(`정말로 모든 참가자에게 [Phase ${phase}] 알림을 발송하시겠습니까?`)) {
                    return;
                }
    
                try {
                    const response = await fetch(`https://us-central1-star-game-971a5.cloudfunctions.net/sendPushNotification?phase=${phase}`);
                    const data = await response.json();
                    
                    if (data.success) {
                        alert(`발송 성공!\n전체: ${data.total_subscriptions}명\n성공: ${data.success_count}명 / 실패: ${data.failure_count}명`);
                    } else {
                        alert(`발송 실패: ${data.message}`);
                    }
                } catch (error) {
                    alert('알림 발송 중 스크립트 오류가 발생했습니다.');
                    console.error(error);
                }
            }
        });
    </script>
</body>
</html>
